[pytest]
; Make the `dlfs` stage-import shim importable no matter where pytest runs from
; (repo root, IDE test runner, or stages/ itself).
pythonpath = stages
testpaths = stages
; Every stage names its file test.py; importlib mode gives each a unique
; module identity so multi-stage runs don't collide.
addopts = --import-mode=importlib
; Stage test files are named test.py, which pytest's default test_*.py
; pattern does NOT match -- without this line a bare `pytest` collects nothing.
python_files = test.py
markers =
    slow: long-running training tests (deselect with -m "not slow")
